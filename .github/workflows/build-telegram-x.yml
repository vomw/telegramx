name: Build & Sign Telegram X APK

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TERM: xterm

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: TGX-Android/Telegram-X
          # the current repo is read only
          # repository: ${{ github.repository }}
          fetch-depth: 0
          submodules: false
          lfs: true

      # need this step when the working repo is not the current repo
      - name: Checkout helper scripts
        uses: actions/checkout@v4
        with:
          path: helpers


      - name: Replace launcher icons
        run: |
          which install
          install -D helpers/ci/app/src/main/res/mipmap-hdpi/app_launcher.png app/src/main/res/mipmap-hdpi/app_launcher.png
          install -D helpers/ci/app/src/main/res/mipmap-hdpi/app_launcher_round.png app/src/main/res/mipmap-hdpi/app_launcher_round.png
          install -D helpers/ci/app/src/main/res/mipmap-mdpi/app_launcher.png app/src/main/res/mipmap-mdpi/app_launcher.png
          install -D helpers/ci/app/src/main/res/mipmap-mdpi/app_launcher_round.png app/src/main/res/mipmap-mdpi/app_launcher_round.png
          install -D helpers/ci/app/src/main/res/mipmap-xhdpi/app_launcher.png app/src/main/res/mipmap-xhdpi/app_launcher.png
          install -D helpers/ci/app/src/main/res/mipmap-xhdpi/app_launcher_round.png app/src/main/res/mipmap-xhdpi/app_launcher_round.png
          install -D helpers/ci/app/src/main/res/mipmap-xxhdpi/app_launcher.png app/src/main/res/mipmap-xxhdpi/app_launcher.png
          install -D helpers/ci/app/src/main/res/mipmap-xxhdpi/app_launcher_round.png app/src/main/res/mipmap-xxhdpi/app_launcher_round.png
          install -D helpers/ci/app/src/main/res/mipmap-xxxhdpi/app_launcher.png app/src/main/res/mipmap-xxxhdpi/app_launcher.png
          install -D helpers/ci/app/src/main/res/mipmap-xxxhdpi/app_launcher_round.png app/src/main/res/mipmap-xxxhdpi/app_launcher_round.png
          rmdir -rfv app/src/main/res/mipmap-anydpi-v26
          git status


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle


      - name: Set up Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3


      - name: Install NDK and Build Tools
        run: |
          chmod +x scripts/*.sh || true
          
          # Dynamically determine required NDK from version.properties
          if [ -f version.properties ]; then
            P_NDK=$(grep "version.ndk_primary" version.properties | cut -d'=' -f2 | tr -d '\r')
            L_NDK=$(grep "version.ndk_legacy" version.properties | cut -d'=' -f2 | tr -d '\r')
          fi
          
          PRIMARY_NDK=${P_NDK:-"23.2.8568313"}
          LEGACY_NDK=${L_NDK:-"23.2.8568313"}
          
          echo "Installing NDK versions: $PRIMARY_NDK, $LEGACY_NDK"
          yes | sdkmanager --install \
            "ndk;$PRIMARY_NDK" \
            "ndk;$LEGACY_NDK" \
            "cmake;3.22.1" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "platforms;android-35" \
            "platforms;android-34"
          
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/$PRIMARY_NDK" >> $GITHUB_ENV


      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm nasm wget unzip git python3 pkg-config libtool gettext ninja-build meson gperf bison flex libunwind-dev libgl1-mesa-dev libgles2-mesa-dev libjpeg-dev libpng-dev libxml2-utils liblzma-dev libbz2-dev zlib1g-dev libgcrypt20-dev libfontconfig1-dev libfreetype6-dev libx11-dev libxext-dev libssl-dev libcurl4-openssl-dev


      - name: Cache native libraries
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.cxx
            app/jni/build
            app/src/main/libs
            app/jni/third_party/ffmpeg/build
            app/jni/third_party/libvpx/build
          key: native-v33-${{ runner.os }}-${{ hashFiles('version.properties', 'helpers/ci/*.sh', 'helpers/ci/*.py') }}
          restore-keys: |
            native-v33-${{ runner.os }}-


      - name: Setup Dependencies
        run: bash helpers/ci/setup_dependencies.sh
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID || '12345' }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CACHE_HIT: ${{ steps.native-cache.outputs.cache-hit }}
          HELPERS_DIR: ${{ github.workspace }}/helpers/ci
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          APP_LABEL: ${{ secrets.APP_LABEL }}
          OLD_PACKAGE_NAME: ${{ secrets.OLD_PACKAGE_NAME }}
          NEW_PACKAGE_NAME: ${{ secrets.NEW_PACKAGE_NAME }}


      - name: Modify Avatars to Square
        run: |
          python helpers/ci/modify_avatars.py


      - name: Remove Update Checker
        run: |
          python helpers/ci/remove_update_checker.py


      - name: Build release APK
        run: bash helpers/ci/build_apk.sh
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          # ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/23.2.8568313
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID || '12345' }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH || 'abcdef0123456789abcdef0123456789' }}


      - name: Sign APK
        id: sign-apk
        run: bash helpers/ci/sign_apk.sh
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}


      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sign-apk.outputs.app_name || 'no app label' }}-${{ steps.sign-apk.outputs.package_name || 'no.package.name' }}-${{ steps.sign-apk.outputs.version_name || 'no-version' }}-c${{ steps.sign-apk.outputs.version_code || '0' }}-arm64-v8a
          path: ${{ steps.sign-apk.outputs.final_name || 'app-release-signed.apk' }}
          retention-days: 1


      - name: Verify APK launcher icon
        run: |
          "$ANDROID_SDK_ROOT/build-tools/36.1.0/aapt" dump badging "${{ steps.sign-apk.outputs.final_name || 'app-release-signed.apk' }}"
          "$ANDROID_SDK_ROOT/build-tools/36.1.0/aapt" dump badging "${{ steps.sign-apk.outputs.final_name || 'app-release-signed.apk' }}" | grep icon
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}


      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign-apk.outputs.final_name || 'app-release-signed.apk' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

